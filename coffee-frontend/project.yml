name: COFFEE
options:
  bundleIdPrefix: com.coffee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

schemes:
  COFFEE:
    build:
      targets:
        COFFEE: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  COFFEE:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
          - Preview Content
    resources:
      - path: Assets.xcassets
      - path: Fonts
      - path: Preview Content
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leonardodigiglio.coffee
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: coffee
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "O COFFEE precisa acessar o microfone para gravar suas aulas."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "O COFFEE usa reconhecimento de fala para transcrever suas aulas em tempo real."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        UIAppFonts:
          - circular-bold.ttf
          - circular-black.ttf
          - circular-medium.ttf
          - circular-book.ttf
