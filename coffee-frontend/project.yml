name: COFFEE
options:
  bundleIdPrefix: com.coffee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

schemes:
  COFFEE:
    build:
      targets:
        COFFEE: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

targets:
  COFFEE:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
          - Preview Content
          - CoffeeWidgets
          - build
    resources:
      - path: Assets.xcassets
      - path: Fonts
      - path: Preview Content
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: br.com.mdwbravo.coffee
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: coffee
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "O COFFEE precisa acessar o microfone para gravar suas aulas."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "O COFFEE usa reconhecimento de fala para transcrever suas aulas em tempo real."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        INFOPLIST_KEY_UIBackgroundModes: audio
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MarkdownUI
      - package: RevenueCat
        product: RevenueCat

  # CoffeeWidgets temporariamente removido para App Store submission
  # Será re-adicionado após aprovação inicial
